name: Bug Report
description: Report a defect in ami
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.
  - type: input
    id: version
    attributes:
      label: ami version or commit
      description: Tag, version, or commit SHA
      placeholder: 0.1.0 or 57f8ab7
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, and npm lockfile type
      placeholder: macOS 15, Bun 1.2.x, bun.lock
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Exact command or workflow snippet
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Redact sensitive information before posting
      render: text
